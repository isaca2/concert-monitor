name: Concert Monitor Scrape

on:
  schedule:
    # Run twice per day (10:00 AM and 10:00 PM UTC)
    - cron: '0 10,22 * * *'
  workflow_dispatch: # Allow manual trigger from the GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Scraper
      env:
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: python run_scrape.py

    - name: Commit and Push DB Changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add instance/concerts.db
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update concert database [skip ci]" && git push)
